<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"></path>
    </pattern>
    <pattern id="gridMajor" width="256" height="256" patternUnits="userSpaceOnUse">
      <path d="M 256 0 L 0 0 0 256" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"></path>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1612"></stop>
      <stop offset="1" stop-color="#120f0b"></stop>
    </linearGradient>
    <pattern id="stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="rgba(255,255,255,0.015)"></rect>
      <rect width="5" height="10" fill="rgba(255,255,255,0.03)"></rect>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"></rect>
  <rect width="1024" height="1024" fill="url(#stripes)"></rect>
  <rect width="1024" height="1024" fill="url(#grid)"></rect>
  <rect width="1024" height="1024" fill="url(#gridMajor)"></rect>

  
  <g fill="rgba(210, 180, 140, 0.09)" stroke="rgba(210, 180, 140, 0.25)" stroke-width="1.5">
    
    <rect x="60" y="720" width="220" height="220" rx="4"></rect>
    
    <rect x="440" y="380" width="180" height="340" rx="2"></rect>
    
    <rect x="720" y="180" width="240" height="220" rx="4"></rect>
    <rect x="780" y="120" width="140" height="80" rx="2"></rect>
    
    <rect x="580" y="540" width="260" height="200" rx="4"></rect>
    <rect x="640" y="490" width="160" height="70" rx="2"></rect>
    
    <rect x="760" y="60" width="200" height="120" rx="4"></rect>
    
    <rect x="280" y="760" width="180" height="60" rx="2"></rect>
    <rect x="280" y="620" width="170" height="60" rx="2"></rect>
    <rect x="440" y="260" width="280" height="60" rx="2"></rect>
    <rect x="440" y="120" width="280" height="80" rx="2"></rect>
  </g>

  
  <g font-family="ui-monospace, monospace" font-size="18" fill="rgba(210,180,140,0.45)" letter-spacing="2">
    <text x="170" y="840" text-anchor="middle">T SPAWN</text>
    <text x="530" y="560" text-anchor="middle">MID</text>
    <text x="840" y="300" text-anchor="middle">A SITE</text>
    <text x="710" y="650" text-anchor="middle">B APPS</text>
    <text x="860" y="130" text-anchor="middle">CT SPAWN</text>
    <text x="580" y="170" text-anchor="middle">TOP MID</text>
    <text x="370" y="800" text-anchor="middle">RAMP</text>
    <text x="370" y="660" text-anchor="middle">PALACE</text>
  </g>

  
  <g transform="translate(940, 960)" font-family="ui-monospace, monospace" font-size="14" fill="rgba(255,255,255,0.3)">
    <circle r="26" fill="none" stroke="rgba(255,255,255,0.2)"></circle>
    <text x="0" y="-14" text-anchor="middle">N</text>
    <text x="0" y="22" text-anchor="middle">S</text>
    <text x="-18" y="4" text-anchor="middle">W</text>
    <text x="18" y="4" text-anchor="middle">E</text>
  </g>

  
  <text x="30" y="50" font-family="ui-monospace, monospace" font-size="14" fill="rgba(255,255,255,0.25)" letter-spacing="3">DE_MIRAGE · RADAR PLACEHOLDER</text>
</svg>