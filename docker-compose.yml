services:

  #
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cs2shadowpro
      POSTGRES_USER: cs2shadowpro
      POSTGRES_PASSWORD: cs2shadowpro
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs2shadowpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  #
  resolver:
    build:
      context: ./services/sharecode-resolver
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      RESOLVER_PORT: "3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  #
  web:
    build: .
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://cs2shadowpro:cs2shadowpro@db/cs2shadowpro
      RESOLVER_URL: http://resolver:3001
    ports:
      - "8000:8000"
    volumes:
      - ./demos_user:/app/demos_user
      - ./demos_pro:/app/demos_pro
      - ./parquet_user:/app/parquet_user
      - ./parquet_pro:/app/parquet_pro
      - ~/.awpy/navs:/root/.awpy/navs:ro
    depends_on:
      db:
        condition: service_healthy
      resolver:
        condition: service_healthy

  #
  worker:
    build: .
    restart: unless-stopped
    command: python -m backend.worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://cs2shadowpro:cs2shadowpro@db/cs2shadowpro
      RESOLVER_URL: http://resolver:3001
      SYNC_INTERVAL_SECONDS: "300"
    volumes:
      - ./demos_user:/app/demos_user
      - ./parquet_pro:/app/parquet_pro
      - ./parquet_user:/app/parquet_user
      - ~/.awpy/navs:/root/.awpy/navs:ro
    depends_on:
      db:
        condition: service_healthy
      resolver:
        condition: service_healthy

  # Manual tool: scrape/download/ingest pro demos on demand.
  # Run with:
  #   docker compose --profile tools run --rm pro-import
  # Or override the command for a specific map/result page.
  pro-import:
    profiles: [tools]
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: "no"
    shm_size: "1gb"
    command: python -m pipeline.jobs.refresh_pro_corpus --limit 2
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://cs2shadowpro:cs2shadowpro@db/cs2shadowpro
      PLAYWRIGHT_HEADLESS: "1"
    volumes:
      - ./demos_pro:/app/demos_pro
      - ./parquet_pro:/app/parquet_pro
      - ~/.awpy/navs:/root/.awpy/navs:ro
    depends_on:
      db:
        condition: service_healthy

  #
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      - web



volumes:
  db_data:
